<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G2 Simulator</title>
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-dimmer: #005515;
    --green-faint: #002a0a;
    --bg: #0a0a0a;
    --panel-bg: #111;
    --border: #222;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--green); font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
  body { display: flex; flex-direction: column; }

  /* ── Top bar ── */
  .topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 12px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .topbar label { color: var(--green-dim); white-space: nowrap; }
  .topbar select {
    background: var(--bg); border: 1px solid var(--border); color: var(--green);
    font-family: inherit; font-size: 12px; padding: 2px 6px; border-radius: 3px;
  }
  .topbar .spacer { flex: 1; }
  .topbar .dim { color: var(--green-dimmer); font-size: 11px; }
  .topbar .status { color: var(--green-dim); font-size: 11px; }
  .topbar .status.ok { color: var(--green); }
  .topbar .status.err { color: #ff4444; }

  /* ── Main layout ── */
  .main { flex: 1; display: flex; min-height: 0; }

  /* ── Simulator viewport — letterboxed ── */
  .sim-viewport {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    min-width: 0; min-height: 0;
    overflow: hidden;
  }
  .sim-frame {
    position: relative;
    box-shadow: 0 0 40px rgba(0,255,65,0.06);
  }
  .sim-frame canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* ── Sidebar ── */
  .sidebar {
    flex: 0 0 300px;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 6px 10px;
    font-size: 12px; font-weight: 600; color: var(--green-dim);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .sidebar-header input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--green);
    font-family: inherit; font-size: 11px; padding: 2px 6px; border-radius: 3px;
  }
  .fn-list {
    flex: 1; overflow-y: auto; padding: 2px 0;
  }
  .fn-list::-webkit-scrollbar { width: 5px; }
  .fn-list::-webkit-scrollbar-track { background: transparent; }
  .fn-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .fn-domain {
    padding: 6px 10px 2px; font-size: 9px;
    text-transform: uppercase; letter-spacing: 1px; color: var(--green-dimmer);
  }
  .fn-item {
    padding: 3px 10px; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    border-left: 2px solid transparent;
  }
  .fn-item:hover { background: rgba(0,255,65,0.05); border-left-color: var(--green-dimmer); }
  .fn-item.selected { background: rgba(0,255,65,0.08); border-left-color: var(--green); }
  .fn-item.is-view { border-left-color: var(--green-dimmer); border-left-style: dotted; }
  .fn-item .method {
    font-size: 9px; font-weight: 700; padding: 0 3px; border-radius: 2px;
    min-width: 30px; text-align: center;
  }
  .fn-item .method.get { color: #4ec9b0; }
  .fn-item .method.post { color: #dcdcaa; }
  .fn-item .method.put { color: #ce9178; }
  .fn-item .method.patch { color: #d7ba7d; }
  .fn-item .method.delete { color: #f44747; }
  .fn-item .name { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Detail panel ── */
  .fn-detail {
    flex: 0 0 auto; max-height: 45%;
    border-top: 1px solid var(--border);
    padding: 6px 10px; overflow-y: auto; font-size: 11px;
  }
  .fn-detail::-webkit-scrollbar { width: 5px; }
  .fn-detail::-webkit-scrollbar-track { background: transparent; }
  .fn-detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .fn-detail h3 { font-size: 12px; color: var(--green); margin-bottom: 3px; }
  .fn-detail .desc { color: var(--green-dim); margin-bottom: 6px; line-height: 1.3; }
  .fn-detail .tags { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
  .fn-detail .tag { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: rgba(0,255,65,0.08); color: var(--green-dim); }
  .fn-detail .params-title { font-size: 10px; color: var(--green-dimmer); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .fn-detail .param { display: flex; gap: 6px; padding: 1px 0; font-size: 11px; }
  .fn-detail .param .pname { color: var(--green); }
  .fn-detail .param .ptype { color: var(--green-dimmer); }
  .fn-detail .param .preq { color: #f44747; font-size: 9px; }
  .fn-detail textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--green);
    font-family: inherit; font-size: 10px; padding: 4px; border-radius: 3px;
    resize: vertical; min-height: 32px; margin-top: 4px;
  }
  .fn-detail .btn-row { display: flex; gap: 4px; margin-top: 4px; }
  .fn-detail button {
    background: rgba(0,255,65,0.1); border: 1px solid var(--green-dimmer); color: var(--green);
    font-family: inherit; font-size: 11px; padding: 3px 12px; border-radius: 3px; cursor: pointer;
  }
  .fn-detail button:hover { background: rgba(0,255,65,0.2); }
  .fn-detail button.view-btn { border-color: #4ec9b0; color: #4ec9b0; }
  .fn-detail .result {
    margin-top: 4px; white-space: pre-wrap; color: var(--green-dim); font-size: 10px;
    max-height: 100px; overflow-y: auto; background: var(--bg); padding: 3px; border-radius: 2px;
  }

  /* ── Bottom bar ── */
  .bottombar {
    flex: 0 0 auto; padding: 3px 12px;
    background: var(--panel-bg); border-top: 1px solid var(--border);
    font-size: 10px; color: var(--green-dimmer); display: flex; gap: 16px;
  }
</style>
</head>
<body>

<div class="topbar">
  <span style="font-weight:700;color:var(--green)">G2</span>
  <span class="dim" id="simDims">576x288</span>
  <label>Line:
    <select id="lineHeight">
      <option value="9">9</option>
      <option value="12">12</option>
      <option value="16" selected>16</option>
      <option value="18">18</option>
      <option value="24">24</option>
      <option value="32">32</option>
      <option value="36">36</option>
      <option value="48">48</option>
    </select>
  </label>
  <label>Screen:
    <select id="screenSelect"><option value="">—</option></select>
  </label>
  <div class="spacer"></div>
  <span class="status" id="connStatus">…</span>
</div>

<div class="main">
  <div class="sim-viewport" id="simViewport">
    <div class="sim-frame" id="simFrame">
      <canvas id="simCanvas"></canvas>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Functions</span>
      <input type="text" id="fnSearch" placeholder="Filter…">
    </div>
    <div class="fn-list" id="fnList"></div>
    <div class="fn-detail" id="fnDetail" style="display:none"></div>
  </div>
</div>

<div class="bottombar">
  <span id="renderInfo">—</span>
  <span id="frameTime"></span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  Constants
// ═══════════════════════════════════════════════════════════════════════
const SIM_W = 576;
const SIM_H = 288;

// 4-bit green micro-LED palette
const PAL = Array.from({length: 16}, (_, i) => {
  const t = i / 15;
  return [Math.round(t * 20), Math.round(t * 255), Math.round(t * 40)];
});

// ═══════════════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════════════
let lineHeight = 16;
let tools = [];           // from /api/g2/tools
let openApiSpec = null;   // from /api/g2/openapi.json
let screens = [];         // auto-derived GET endpoints suitable as "views"
let currentScreen = null; // { path, method, operationId, ... }
let screenData = null;    // last fetched data for current screen
let selectedFn = null;    // selected function in sidebar

// ═══════════════════════════════════════════════════════════════════════
//  Canvas + letterbox
// ═══════════════════════════════════════════════════════════════════════
const viewport = document.getElementById('simViewport');
const frame = document.getElementById('simFrame');
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
canvas.width = SIM_W;
canvas.height = SIM_H;

function resizeSimulator() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const aspect = SIM_W / SIM_H;
  let w, h;
  if (vw / vh > aspect) {
    h = vh; w = h * aspect;
  } else {
    w = vw; h = w / aspect;
  }
  frame.style.width = Math.floor(w) + 'px';
  frame.style.height = Math.floor(h) + 'px';
}
new ResizeObserver(resizeSimulator).observe(viewport);
resizeSimulator();

// ═══════════════════════════════════════════════════════════════════════
//  Drawing primitives (G2 display model)
// ═══════════════════════════════════════════════════════════════════════
function palColor(level) {
  const [r, g, b] = PAL[Math.min(15, Math.max(0, level))];
  return `rgb(${r},${g},${b})`;
}

function clear() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SIM_W, SIM_H);
}

function text(str, x, y, color = 10, size = lineHeight) {
  ctx.fillStyle = palColor(color);
  ctx.font = `${size}px 'SF Mono','Fira Code',monospace`;
  ctx.textBaseline = 'top';
  ctx.fillText(str, x, y);
}

function border(x, y, w, h, color = 6, lw = 1) {
  ctx.strokeStyle = palColor(color);
  ctx.lineWidth = lw;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
}

function hline(y, color = 3) {
  ctx.strokeStyle = palColor(color);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(SIM_W, y + 0.5); ctx.stroke();
}

function wrap(str, maxW, size = lineHeight) {
  ctx.font = `${size}px 'SF Mono','Fira Code',monospace`;
  const words = str.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const t = cur ? cur + ' ' + w : w;
    if (ctx.measureText(t).width > maxW) {
      if (cur) lines.push(cur);
      cur = w;
    } else cur = t;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ═══════════════════════════════════════════════════════════════════════
//  Generic data renderer — renders any JSON onto the G2 display
// ═══════════════════════════════════════════════════════════════════════
function renderDisplay() {
  const t0 = performance.now();
  clear();
  const maxLines = Math.floor(SIM_H / lineHeight);
  const pad = 4;
  let y = 0;
  let drawn = 0;

  // Title bar — always first line
  const title = currentScreen
    ? currentScreen.label || currentScreen.operationId || currentScreen.path
    : 'G2 Simulator';
  border(0, 0, SIM_W, lineHeight, 4, 1);
  text(title, pad, 0, 15, lineHeight);
  const now = new Date();
  const ts = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  ctx.font = `${lineHeight}px 'SF Mono','Fira Code',monospace`;
  text(ts, SIM_W - ctx.measureText(ts).width - pad - 1, 0, 7, lineHeight);
  y = lineHeight;
  drawn++;

  // Separator
  hline(y, 3);
  y += 1;

  if (!screenData) {
    text('No data', pad, y, 5);
    drawn++;
  } else if (Array.isArray(screenData)) {
    // List view: each item gets one line
    if (!screenData.length) {
      text('(empty)', pad, y, 4);
      drawn++;
    }
    for (const item of screenData) {
      if (y + lineHeight > SIM_H) break;
      const line = renderItemLine(item);
      // Clip to display width
      const clipped = clipText(line, SIM_W - pad * 2);
      text(clipped, pad, y, 10);
      y += lineHeight;
      drawn++;
    }
  } else if (typeof screenData === 'object') {
    // Key-value view with aligned columns
    const entries = Object.entries(screenData).map(([k, v]) => [humanLabel(k), formatValue(v)]);
    // Find max key width for alignment
    ctx.font = `${lineHeight}px 'SF Mono','Fira Code',monospace`;
    let maxKeyW = 0;
    for (const [k] of entries) {
      maxKeyW = Math.max(maxKeyW, ctx.measureText(k + ' ').width);
    }
    maxKeyW = Math.min(maxKeyW, SIM_W * 0.4); // cap at 40% of display

    for (const [key, val] of entries) {
      if (y + lineHeight > SIM_H) break;
      const keyClipped = clipText(key, maxKeyW - 2);
      text(keyClipped, pad, y, 6, lineHeight);
      const valClipped = clipText(val, SIM_W - pad * 2 - maxKeyW - 2);
      text(valClipped, pad + maxKeyW + 2, y, 12);
      y += lineHeight;
      drawn++;
    }
  } else {
    const lines = wrap(String(screenData), SIM_W - pad * 2);
    for (const line of lines) {
      if (y + lineHeight > SIM_H) break;
      text(line, pad, y, 10);
      y += lineHeight;
      drawn++;
    }
  }

  const ms = (performance.now() - t0).toFixed(1);
  document.getElementById('renderInfo').textContent =
    `${drawn}/${maxLines} lines | ${lineHeight}px | ${currentScreen?.path || '—'}`;
  document.getElementById('frameTime').textContent = `${ms}ms`;
}

function clipText(str, maxW) {
  ctx.font = `${lineHeight}px 'SF Mono','Fira Code',monospace`;
  if (ctx.measureText(str).width <= maxW) return str;
  while (str.length > 1 && ctx.measureText(str + '…').width > maxW) str = str.slice(0, -1);
  return str + '…';
}

function renderItemLine(item) {
  if (typeof item === 'string') return item;
  if (typeof item !== 'object' || !item) return String(item);
  // Pick the most useful fields to show in a single line
  const id = item.id || item.name || item.title || '';
  const status = item.status ? ` [${item.status}]` : '';
  const desc = item.description || item.goal || item.body || item.text || '';
  const extra = desc ? ' — ' + desc.slice(0, 50) : '';
  return `${id}${status}${extra}`;
}

function formatValue(val) {
  if (val === null || val === undefined) return '—';
  if (typeof val === 'boolean') return val ? 'yes' : 'no';
  if (typeof val === 'number') return String(val);
  if (typeof val === 'string') return val;
  if (Array.isArray(val)) return val.length ? `[${val.length} items]` : '[]';
  if (typeof val === 'object') return JSON.stringify(val);
  return String(val);
}

function humanLabel(key) {
  return key.replace(/([A-Z])/g, ' $1').replace(/[_-]/g, ' ').trim().toLowerCase();
}

// ═══════════════════════════════════════════════════════════════════════
//  API + OpenAPI discovery
// ═══════════════════════════════════════════════════════════════════════
async function fetchJson(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function loadOpenApiSpec() {
  try {
    openApiSpec = await fetchJson('/api/g2/openapi.json');
    deriveScreens();
    deriveToolsFromSpec();
    setStatus('ok', `${tools.length} fn`);
  } catch (e) {
    setStatus('err', e.message);
  }
}

function deriveScreens() {
  screens = [];
  const sel = document.getElementById('screenSelect');
  sel.innerHTML = '';
  if (!openApiSpec?.paths) return;

  for (const [path, methods] of Object.entries(openApiSpec.paths)) {
    const getOp = methods.get;
    if (!getOp) continue;
    // Skip endpoints with required path params (need input)
    if (path.includes('{')) continue;
    const opId = getOp.operationId || path;
    const label = getOp.summary || humanLabel(opId);
    screens.push({ path: '/api/g2' + path, method: 'GET', operationId: opId, label, spec: getOp });
    const opt = document.createElement('option');
    opt.value = screens.length - 1;
    opt.textContent = label;
    sel.appendChild(opt);
  }

  // Auto-select first screen (usually /home)
  if (screens.length > 0) {
    // Prefer /home if it exists
    const homeIdx = screens.findIndex(s => s.path.endsWith('/home'));
    const idx = homeIdx >= 0 ? homeIdx : 0;
    sel.value = idx;
    selectScreen(idx);
  }
}

function deriveToolsFromSpec() {
  tools = [];
  if (!openApiSpec?.paths) return;

  for (const [path, methods] of Object.entries(openApiSpec.paths)) {
    for (const [method, op] of Object.entries(methods)) {
      if (method === 'parameters') continue;
      const fullPath = '/api/g2' + path;
      const hasPathParams = path.includes('{');
      const isGet = method === 'get';
      const isView = isGet && !hasPathParams;
      tools.push({
        name: op.operationId || `${method} ${path}`,
        description: op.summary || op.description || '',
        method: method.toUpperCase(),
        path: fullPath,
        pathTemplate: path,
        hasPathParams,
        isView,
        mutatesState: !isGet,
        domains: op.tags || [],
        tags: op['x-tags'] || [],
        parameters: op.parameters || [],
        requestBody: op.requestBody,
        spec: op,
      });
    }
  }
  renderFnList();
}

async function selectScreen(idx) {
  currentScreen = screens[idx];
  if (!currentScreen) return;
  try {
    screenData = await fetchJson(currentScreen.path);
    // If response is wrapped in a known envelope, unwrap
    if (screenData && typeof screenData === 'object' && !Array.isArray(screenData)) {
      // Check for agentFormat (string render)
      if ('agentFormat' in screenData && typeof screenData.agentFormat === 'string') {
        // Keep the structured data, not the string
      }
    }
  } catch (e) {
    screenData = { error: e.message };
  }
  renderDisplay();
}

async function invokeFunction(fn, params = {}) {
  let path = fn.path;
  // Substitute path params
  for (const [key, val] of Object.entries(params)) {
    path = path.replace(`{${key}}`, encodeURIComponent(val));
  }

  const isGet = fn.method === 'GET';
  const opts = isGet
    ? {}
    : { method: fn.method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(params) };

  const res = await fetch(path, opts);
  return res.json();
}

// ═══════════════════════════════════════════════════════════════════════
//  Sidebar: function list
// ═══════════════════════════════════════════════════════════════════════
function renderFnList(filter = '') {
  const list = document.getElementById('fnList');
  list.innerHTML = '';
  const lc = filter.toLowerCase();
  const grouped = {};

  for (const fn of tools) {
    if (lc && !fn.name.toLowerCase().includes(lc) && !fn.description.toLowerCase().includes(lc)) continue;
    const domain = fn.domains[0] || 'general';
    if (!grouped[domain]) grouped[domain] = [];
    grouped[domain].push(fn);
  }

  for (const [domain, fns] of Object.entries(grouped).sort((a, b) => a[0].localeCompare(b[0]))) {
    const hdr = document.createElement('div');
    hdr.className = 'fn-domain';
    hdr.textContent = domain;
    list.appendChild(hdr);

    for (const fn of fns) {
      const el = document.createElement('div');
      const isSel = selectedFn?.name === fn.name;
      el.className = 'fn-item' + (isSel ? ' selected' : '') + (fn.isView ? ' is-view' : '');
      el.innerHTML = `<span class="method ${fn.method.toLowerCase()}">${fn.method}</span><span class="name">${fn.name}</span>`;
      el.onclick = () => { selectedFn = fn; renderFnList(filter); showDetail(fn); };
      list.appendChild(el);
    }
  }
}

function showDetail(fn) {
  const d = document.getElementById('fnDetail');
  d.style.display = 'block';

  let h = `<h3>${fn.name}</h3>`;
  h += `<div class="desc">${fn.description}</div>`;
  if (fn.domains.length) {
    h += '<div class="tags">';
    for (const t of fn.domains) h += `<span class="tag">${t}</span>`;
    h += '</div>';
  }

  // Parameters
  const params = fn.parameters || [];
  const bodySchema = fn.requestBody?.content?.['application/json']?.schema;
  const allParams = [...params];

  if (params.length || bodySchema) {
    h += '<div class="params-title">Parameters</div>';
    for (const p of params) {
      const req = p.required ? '<span class="preq"> *</span>' : '';
      h += `<div class="param"><span class="pname">${p.name}${req}</span><span class="ptype">${p.schema?.type || '?'}</span></div>`;
    }
    if (bodySchema?.properties) {
      const reqSet = new Set(bodySchema.required || []);
      for (const [name, prop] of Object.entries(bodySchema.properties)) {
        const req = reqSet.has(name) ? '<span class="preq"> *</span>' : '';
        h += `<div class="param"><span class="pname">${name}${req}</span><span class="ptype">${prop.type || '?'}</span></div>`;
      }
    }
  }

  // Build default invocation body
  const defaultObj = {};
  for (const p of params) {
    if (p.in === 'path') defaultObj[p.name] = p.schema?.default ?? '';
  }
  if (bodySchema?.properties) {
    for (const [k, v] of Object.entries(bodySchema.properties)) {
      defaultObj[k] = v.default ?? (v.type === 'string' ? '' : v.type === 'number' ? 0 : null);
    }
  }

  h += `<textarea id="invokeBody">${JSON.stringify(defaultObj, null, 2)}</textarea>`;
  h += '<div class="btn-row">';
  h += `<button onclick="doInvoke()">Invoke</button>`;
  if (fn.isView) h += `<button class="view-btn" onclick="doViewOnSim()">View on display</button>`;
  h += '</div>';
  h += '<div class="result" id="invokeResult"></div>';

  d.innerHTML = h;
}

async function doInvoke() {
  if (!selectedFn) return;
  const result = document.getElementById('invokeResult');
  result.textContent = '…';
  try {
    const params = JSON.parse(document.getElementById('invokeBody').value);
    const data = await invokeFunction(selectedFn, params);
    result.textContent = JSON.stringify(data, null, 2);
    // Refresh display if mutating
    if (selectedFn.mutatesState && currentScreen) selectScreen(
      screens.indexOf(currentScreen)
    );
  } catch (e) {
    result.textContent = 'Error: ' + e.message;
  }
}

function doViewOnSim() {
  if (!selectedFn?.isView) return;
  // Find the matching screen and switch to it
  const idx = screens.findIndex(s => s.path === selectedFn.path);
  if (idx >= 0) {
    document.getElementById('screenSelect').value = idx;
    selectScreen(idx);
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('connStatus');
  el.className = 'status ' + type;
  el.textContent = msg;
}

// ═══════════════════════════════════════════════════════════════════════
//  Events
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('lineHeight').onchange = function() {
  lineHeight = parseInt(this.value);
  document.getElementById('simDims').textContent = `${SIM_W}x${SIM_H} @${lineHeight}`;
  renderDisplay();
};

document.getElementById('screenSelect').onchange = function() {
  selectScreen(parseInt(this.value));
};

document.getElementById('fnSearch').oninput = function() {
  renderFnList(this.value);
};

// SSE for live updates
function connectSSE() {
  try {
    const es = new EventSource('/api/g2/events');
    es.onopen = () => { /* keep status from tool count */ };
    es.onerror = () => {};
    for (const evt of ['agent_started','agent_completed','routine_reminder','alarm_triggered']) {
      es.addEventListener(evt, () => {
        if (currentScreen) selectScreen(screens.indexOf(currentScreen));
      });
    }
  } catch (e) {}
}

// ═══════════════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════════════
(async () => {
  setStatus('ok', 'loading…');
  renderDisplay(); // show empty state
  await loadOpenApiSpec();
  connectSSE();
})();
</script>
