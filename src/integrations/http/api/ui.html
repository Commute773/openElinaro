<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>G2 Simulator</title>
<style>
:root {
  --green: #00ff41; --dim: #00aa2a; --dimmer: #005515; --faint: #002a0a;
  --bg: #0a0a0a; --panel: #111; --border: #222;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--green);
  font-family:'SF Mono','Fira Code','Cascadia Code',monospace; }
body { display:flex; flex-direction:column; }

.topbar { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:4px 10px;
  background:var(--panel); border-bottom:1px solid var(--border); font-size:11px; }
.topbar select { background:var(--bg); border:1px solid var(--border); color:var(--green);
  font-family:inherit; font-size:11px; padding:1px 4px; border-radius:3px; }
.topbar .spacer { flex:1; }
.topbar .dim { color:var(--dimmer); }
.topbar .status { font-size:10px; color:var(--dim); }

.main { flex:1; display:flex; min-height:0; }

/* Simulator viewport */
.sim-viewport { flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; background:#000; min-width:0; min-height:0; overflow:hidden; }
.sim-frame { position:relative; }
.sim-frame canvas { display:block; }

/* Controls */
.sim-controls { flex:0 0 auto; display:flex; gap:6px; padding:8px; align-items:center; }
.sim-controls button { background:rgba(0,255,65,0.08); border:1px solid var(--dimmer);
  color:var(--green); font-family:inherit; font-size:13px; padding:6px 14px; border-radius:4px;
  cursor:pointer; min-width:44px; }
.sim-controls button:hover { background:rgba(0,255,65,0.15); }
.sim-controls button:active { background:rgba(0,255,65,0.25); }
.sim-controls button.voice { color:#4ec9b0; border-color:#4ec9b0; }
.sim-controls button.voice.listening { background:rgba(78,201,176,0.2); animation:pulse 1s infinite; }
@keyframes pulse { 50% { opacity:0.6; } }

.bottombar { flex:0 0 auto; padding:2px 10px; background:var(--panel);
  border-top:1px solid var(--border); font-size:9px; color:var(--dimmer); display:flex; gap:12px; }

.chat-input { position:absolute; bottom:0; left:0; width:100%;
  background:rgba(0,10,0,0.95); border:none; border-top:1px solid var(--dimmer);
  color:var(--green); font-family:inherit; font-size:14px;
  padding:6px 8px; outline:none; display:none; }
.chat-input::placeholder { color:var(--dimmer); }
</style>
</head>
<body>

<div class="topbar">
  <span style="font-weight:700;color:var(--green)">G2</span>
  <span class="dim" id="dims">576x288</span>
  <label style="color:var(--dim)">Line:
    <select id="lineHeight">
      <option value="9">9</option><option value="12">12</option>
      <option value="16" selected>16</option><option value="18">18</option>
      <option value="24">24</option><option value="32">32</option>
      <option value="36">36</option><option value="48">48</option>
    </select>
  </label>
  <div class="spacer"></div>
  <span class="status" id="status">…</span>
</div>

<div class="main">
  <div class="sim-viewport" id="viewport">
    <div class="sim-frame" id="frame">
      <canvas id="display"></canvas>
      <input type="text" class="chat-input" id="chatInput" placeholder="> type a message..." autocomplete="off">
    </div>
    <div class="sim-controls">
      <button onclick="input('up')" title="Swipe Up (↑)">▲</button>
      <button onclick="input('down')" title="Swipe Down (↓)">▼</button>
      <button onclick="input('press')" title="Tap (Enter)">Press</button>
      <button onclick="input('longpress')" title="Hold (Esc)">Hold</button>
      <button class="voice" id="voiceBtn" onclick="input('voice')" title="Voice (V)">🎤</button>
    </div>
  </div>
</div>

<div class="bottombar">
  <span id="info">—</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const W = 576, H = 288;
const PAL = Array.from({length:16},(_,i)=>{
  const t=i/15; return [Math.round(t*20),Math.round(t*255),Math.round(t*40)];
});

// ═══════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════
let LH = 16;                 // line height
let screenStack = [];         // navigation stack

// Agent chat state
let chatBlocks = [];          // array of block objects
let chatScroll = 0;           // scroll offset in flattened lines
let chatAutoScroll = true;    // follow new content
let chatAbort = null;         // AbortController for active stream
let chatStreamActive = false; // true while receiving events from own /api/chat/stream

// ═══════════════════════════════════════════════════════════════════════
//  BITMAP FONT ATLAS — pixel-perfect character tiles
// ═══════════════════════════════════════════════════════════════════════
const CHARS = (() => {
  let s = '';
  for (let i = 32; i < 127; i++) s += String.fromCharCode(i);
  s += '\u25B8\u2500\u25D0\u2713\u2717\u2026\u25CF\u2014';
  return s;
})();

let font = null; // { atlas, charWidth, tileH, charMap }

const FONT_FAMILY = "'SF Mono','Fira Code','Cascadia Code',monospace";

/** Measure the actual pixel tile height for a given CSS font size */
function measureTileH(fontSize) {
  const tmp = document.createElement('canvas');
  const tctx = tmp.getContext('2d');
  tctx.font = `${fontSize}px ${FONT_FAMILY}`;
  const cw = Math.ceil(tctx.measureText('M').width);
  tmp.width = cw + 2;
  tmp.height = fontSize * 3;
  tctx.font = `${fontSize}px ${FONT_FAMILY}`;
  tctx.textBaseline = 'alphabetic';
  const bl = fontSize * 2;
  let minY = tmp.height, maxY = 0;
  for (const ch of CHARS) {
    tctx.clearRect(0, 0, tmp.width, tmp.height);
    tctx.fillStyle = '#fff';
    tctx.fillText(ch, 0, bl);
    const d = tctx.getImageData(0, 0, tmp.width, tmp.height).data;
    for (let y = 0; y < tmp.height; y++) {
      for (let x = 0; x < tmp.width; x++) {
        if (d[(y * tmp.width + x) * 4 + 3] > 0) {
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
  }
  return (minY > maxY) ? fontSize : maxY - minY + 1;
}

/** Find the CSS font size whose glyph pixels fit exactly in targetH */
function findFontSize(targetH) {
  let lo = 1, hi = targetH * 2, best = targetH;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    const h = measureTileH(mid);
    if (h <= targetH) { best = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  return best;
}

/** Build the atlas for a target tile height */
function buildFont(targetTileH) {
  const fontSize = findFontSize(targetTileH);
  const tileH = targetTileH; // exact requested height

  const tmp = document.createElement('canvas');
  const tctx = tmp.getContext('2d');
  tctx.font = `${fontSize}px ${FONT_FAMILY}`;
  const charWidth = Math.ceil(tctx.measureText('M').width);

  // Measure actual glyph bounds for vertical centering in the tile
  tmp.width = charWidth + 2;
  tmp.height = fontSize * 3;
  tctx.font = `${fontSize}px ${FONT_FAMILY}`;
  tctx.textBaseline = 'alphabetic';
  const baseline = fontSize * 2;
  let minY = tmp.height, maxY = 0;
  for (const ch of CHARS) {
    tctx.clearRect(0, 0, tmp.width, tmp.height);
    tctx.fillStyle = '#fff';
    tctx.fillText(ch, 0, baseline);
    const d = tctx.getImageData(0, 0, tmp.width, tmp.height).data;
    for (let y = 0; y < tmp.height; y++) {
      for (let x = 0; x < tmp.width; x++) {
        if (d[(y * tmp.width + x) * 4 + 3] > 0) {
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
  }
  const glyphH = (minY > maxY) ? fontSize : maxY - minY + 1;
  const ascent = baseline - minY;
  // Center glyphs vertically if they're shorter than the tile
  const yOffset = Math.floor((tileH - glyphH) / 2);

  // Build atlas: 16 palette rows × CHARS.length columns
  const atlas = document.createElement('canvas');
  atlas.width = charWidth * CHARS.length;
  atlas.height = tileH * 16;
  const actx = atlas.getContext('2d');
  actx.font = `${fontSize}px ${FONT_FAMILY}`;
  actx.textBaseline = 'alphabetic';

  for (let p = 0; p < 16; p++) {
    const [r, g, b] = PAL[p];
    actx.fillStyle = `rgb(${r},${g},${b})`;
    for (let i = 0; i < CHARS.length; i++) {
      actx.fillText(CHARS[i], i * charWidth, p * tileH + yOffset + ascent);
    }
  }

  const charMap = new Map();
  for (let i = 0; i < CHARS.length; i++) charMap.set(CHARS[i], i);

  font = { atlas, charWidth, tileH, charMap };
}

// ═══════════════════════════════════════════════════════════════════════
//  CRISP CANVAS — offscreen framebuffer + nearest-neighbor blit
// ═══════════════════════════════════════════════════════════════════════
const fb = document.createElement('canvas');
fb.width = W; fb.height = H;
const fc = fb.getContext('2d');

const display = document.getElementById('display');
const dc = display.getContext('2d');
const viewport = document.getElementById('viewport');
const frame = document.getElementById('frame');

function resize() {
  // Available space (viewport minus controls)
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight - 60; // reserve for controls
  const aspect = W / H;
  let w, h;
  if (vw / vh > aspect) { h = vh; w = h * aspect; }
  else { w = vw; h = w / aspect; }
  w = Math.floor(w); h = Math.floor(h);
  // Set display canvas pixel size to match CSS size * dpr for sharpness
  const dpr = window.devicePixelRatio || 1;
  display.width = w * dpr;
  display.height = h * dpr;
  display.style.width = w + 'px';
  display.style.height = h + 'px';
  frame.style.width = w + 'px';
  frame.style.height = h + 'px';
  blit();
}

function blit() {
  dc.imageSmoothingEnabled = false;
  dc.drawImage(fb, 0, 0, display.width, display.height);
}

new ResizeObserver(resize).observe(viewport);
resize();

// ═══════════════════════════════════════════════════════════════════════
//  DRAWING PRIMITIVES (on framebuffer)
// ═══════════════════════════════════════════════════════════════════════
function clr() { fc.fillStyle='#000'; fc.fillRect(0,0,W,H); }

function col(level) {
  const [r,g,b] = PAL[Math.min(15,Math.max(0,level))];
  return `rgb(${r},${g},${b})`;
}

function txt(s, x, y, c=10) {
  const p = Math.min(15, Math.max(0, c));
  const srcY = p * font.tileH;
  const cw = font.charWidth;
  const th = font.tileH;
  for (let i = 0; i < s.length; i++) {
    const idx = font.charMap.get(s[i]);
    if (idx === undefined) continue;
    fc.drawImage(font.atlas, idx * cw, srcY, cw, th, x + i * cw, y, cw, th);
  }
}

function hline(y, c=3) {
  fc.strokeStyle = col(c); fc.lineWidth = 1;
  fc.beginPath(); fc.moveTo(0,y+.5); fc.lineTo(W,y+.5); fc.stroke();
}

function rect(x,y,w,h,c=5) {
  fc.strokeStyle = col(c); fc.lineWidth = 1;
  fc.strokeRect(x+.5,y+.5,w-1,h-1);
}

function clip(s, maxW) {
  const maxChars = Math.floor(maxW / font.charWidth);
  if (s.length <= maxChars) return s;
  return s.slice(0, maxChars - 1) + '\u2026';
}

// ═══════════════════════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════════════════════
function render() {
  const t0 = performance.now();
  clr();
  const screen = screenStack[screenStack.length - 1];
  if (!screen) { txt('Loading...', 4, font.tileH*2, 6); blit(); return; }

  document.getElementById('chatInput').style.display = screen.isChat ? 'block' : 'none';

  const TH = font.tileH;
  const maxLines = Math.floor(H / TH);
  const pad = 4;

  // Title bar
  rect(0, 0, W, TH, 4);
  txt(screen.title, pad, 0, 15);
  const ts = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  txt(ts, W - ts.length * font.charWidth - pad, 0, 7);

  const contentStart = TH + 1;
  hline(TH, 3);
  const contentLines = maxLines - 1;

  // ── Agent Chat rendering ──
  if (screen.isChat) {
    const flatLines = flattenChatBlocks();
    // Auto-scroll to bottom
    if (chatAutoScroll) {
      chatScroll = Math.max(0, flatLines.length - contentLines);
    }
    for (let i = 0; i < contentLines; i++) {
      const idx = chatScroll + i;
      if (idx >= flatLines.length) break;
      const y = contentStart + i * TH;
      txt(clip(flatLines[idx], W - pad * 2), pad, y, 15);
    }
    // Scrollbar
    if (flatLines.length > contentLines) {
      const barH = Math.max(8, (contentLines / flatLines.length) * (H - contentStart));
      const barY = contentStart + (chatScroll / flatLines.length) * (H - contentStart);
      fc.fillStyle = col(15);
      fc.fillRect(W - 3, barY, 2, barH);
    }
    blit();
    document.getElementById('info').textContent =
      `${flatLines.length} lines | ${TH}px | Agent Chat | ${(performance.now()-t0).toFixed(1)}ms`;
    return;
  }

  // ── Standard menu rendering ──
  const items = screen.lines || [];
  const cursor = screen.cursor ?? -1;
  const scrollOffset = screen.scroll ?? 0;

  for (let i = 0; i < contentLines; i++) {
    const idx = scrollOffset + i;
    if (idx >= items.length) break;
    const y = contentStart + i * TH;
    const item = items[idx];
    const isCursor = idx === cursor;

    if (isCursor) {
      // Highlight bar
      fc.fillStyle = col(2);
      fc.fillRect(0, y, W, TH);
    }

    const prefix = isCursor ? '\u25B8 ' : '  ';
    const text = prefix + (typeof item === 'string' ? item : item.text || '');
    const color = isCursor ? 15 : (item.color ?? 10);
    txt(clip(text, W - pad * 2), pad, y, color);
  }

  // Scrollbar
  if (items.length > contentLines) {
    const barH = Math.max(8, (contentLines / items.length) * (H - contentStart));
    const barY = contentStart + (scrollOffset / items.length) * (H - contentStart);
    fc.fillStyle = col(3);
    fc.fillRect(W - 3, barY, 2, barH);
  }

  blit();
  document.getElementById('info').textContent =
    `${Math.min(items.length, contentLines)}/${items.length} items | ${TH}px | ${screen.title} | ${(performance.now()-t0).toFixed(1)}ms`;
}

// ═══════════════════════════════════════════════════════════════════════
//  SCREEN SYSTEM
// ═══════════════════════════════════════════════════════════════════════
function pushScreen(screen) {
  screenStack.push(screen);
  if (screen.init) screen.init();
  render();
}

function popScreen() {
  if (screenStack.length > 1) {
    screenStack.pop();
    render();
  }
}

function currentScreen() {
  return screenStack[screenStack.length - 1];
}

// Scroll helpers
function scrollToCursor(screen) {
  const maxVisible = Math.floor(H / font.tileH) - 1;
  if (screen.cursor < screen.scroll) screen.scroll = screen.cursor;
  if (screen.cursor >= screen.scroll + maxVisible) screen.scroll = screen.cursor - maxVisible + 1;
}

// ═══════════════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════════════════
function input(action) {
  const s = currentScreen();
  if (!s) return;

  // Agent chat mode has different navigation
  if (s.isChat) {
    const flatLines = flattenChatBlocks();
    const contentLines = Math.floor(H / font.tileH) - 1;
    if (action === 'up') {
      if (chatScroll > 0) { chatScroll--; chatAutoScroll = false; render(); }
    } else if (action === 'down') {
      if (chatScroll < Math.max(0, flatLines.length - contentLines)) {
        chatScroll++;
        if (chatScroll >= flatLines.length - contentLines) chatAutoScroll = true;
        render();
      }
    } else if (action === 'press') {
      document.getElementById('chatInput').focus();
    } else if (action === 'longpress') {
      if (chatAbort) { chatAbort.abort(); chatAbort = null; }
      popScreen();
    } else if (action === 'voice') {
      startVoice();
    }
    return;
  }

  if (action === 'up') {
    if (s.cursor > 0) { s.cursor--; scrollToCursor(s); render(); }
  } else if (action === 'down') {
    if (s.cursor < (s.lines?.length ?? 0) - 1) { s.cursor++; scrollToCursor(s); render(); }
  } else if (action === 'press') {
    if (s.onPress) s.onPress(s.cursor);
  } else if (action === 'longpress') {
    if (s.onLongPress) s.onLongPress();
    else popScreen();
  } else if (action === 'voice') {
    startVoice();
  }
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); input('up'); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); input('down'); break;
    case 'Enter': case ' ': e.preventDefault(); input('press'); break;
    case 'Escape': case 'Backspace': e.preventDefault(); input('longpress'); break;
    case 'v': case 'V': e.preventDefault(); input('voice'); break;
    case 't': case 'T': e.preventDefault();
      if (!currentScreen()?.isChat) pushScreen(makeAgentChatScreen());
      break;
  }
});

// ═══════════════════════════════════════════════════════════════════════
//  CHAT TEXT INPUT
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const el = e.target;
    const text = el.value.trim();
    if (text) { sendChatMessage(text); el.value = ''; }
  } else if (e.key === 'Escape') {
    e.preventDefault();
    e.target.blur();
  }
});

// ═══════════════════════════════════════════════════════════════════════
//  VOICE (Web Speech API)
// ═══════════════════════════════════════════════════════════════════════
let recognition = null;
let listening = false;

function startVoice() {
  if (listening) { stopVoice(); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showMessage('Speech not supported'); return; }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    listening = true;
    document.getElementById('voiceBtn').classList.add('listening');
    showMessage('Listening...');
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    stopVoice();
    handleVoiceInput(text);
  };

  recognition.onerror = () => stopVoice();
  recognition.onend = () => stopVoice();
  recognition.start();
}

function stopVoice() {
  listening = false;
  document.getElementById('voiceBtn').classList.remove('listening');
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
}

async function handleVoiceInput(text) {
  // Route to agent chat if on that screen
  const s = currentScreen();
  if (s?.isChat) {
    sendChatMessage(text);
    return;
  }

  showMessage(`"${text}" — asking...`);
  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    const answer = data.display || data.text || data.reply || JSON.stringify(data);
    pushScreen(makeTextScreen('Response', answer));
  } catch (e) {
    showMessage('Voice error: ' + e.message);
  }
}

function showMessage(msg) {
  const s = currentScreen();
  if (s) { s._message = msg; }
  // Flash in status bar
  document.getElementById('status').textContent = msg;
  setTimeout(() => { document.getElementById('status').textContent = ''; }, 3000);
}

// ═══════════════════════════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════════════════════════
async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function apiPost(path, body = {}) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ═══════════════════════════════════════════════════════════════════════
//  SCREEN FACTORIES
// ═══════════════════════════════════════════════════════════════════════

/** Generic screen from display string — splits on newlines */
function makeTextScreen(title, text) {
  const lines = text.split('\n').map(t => ({ text: t, color: 10 }));
  return { title, lines, cursor: 0, scroll: 0, onLongPress: popScreen };
}

/** Generic API screen — fetches endpoint, renders display */
function makeApiScreen(title, path, opts = {}) {
  return {
    title,
    lines: [{ text: 'Loading...', color: 5 }],
    cursor: opts.cursor !== false ? 0 : -1,
    scroll: 0,
    _path: path,
    _data: null,
    _items: null,
    async init() {
      try {
        const data = await api(path);
        this._data = data;
        // Use display if available
        if (data.display) {
          this.lines = data.display.split('\n').map((t, i) => ({
            text: t,
            color: 10,
            _index: i,
          }));
        } else if (Array.isArray(data)) {
          this._items = data;
          this.lines = data.map((item, i) => ({
            text: item.display || item.title || item.name || item.id || JSON.stringify(item),
            color: 10,
            _index: i,
            _item: item,
          }));
        } else if (data.items && Array.isArray(data.items)) {
          this._items = data.items;
          if (data.display) {
            this.lines = data.display.split('\n').map((t, i) => ({
              text: t, color: 10, _index: i,
              _item: data.items[i],
            }));
          } else {
            this.lines = data.items.map((item, i) => ({
              text: item.display || item.title || item.name || item.id || String(item),
              color: 10, _index: i, _item: item,
            }));
          }
        }
        if (!this.lines.length) this.lines = [{ text: '(empty)', color: 4 }];
        this.cursor = opts.cursor !== false ? 0 : -1;
        render();
      } catch (e) {
        this.lines = [{ text: 'Error: ' + e.message, color: 4 }];
        render();
      }
    },
    onPress: opts.onPress || null,
    onLongPress: opts.onLongPress || popScreen,
  };
}

// ── Home Screen ──────────────────────────────────────────────────────
function makeHomeScreen() {
  const menuItems = [
    { text: 'Routines',      screen: () => makeRoutinesScreen() },
    { text: 'Notifications', screen: () => makeNotificationsScreen() },
    { text: 'Agents',        screen: () => makeAgentsScreen() },
    { text: 'Health',        screen: () => makeApiScreen('Health', '/api/health') },
    { text: 'Finance',       screen: () => makeApiScreen('Finance', '/api/finance/summary') },
    { text: 'Projects',      screen: () => makeApiScreen('Projects', '/api/projects') },
    { text: 'Todos',         screen: () => makeTodosScreen() },
  ];

  return {
    title: 'Home',
    lines: [{ text: 'Loading...', color: 5 }],
    cursor: 0,
    scroll: 0,
    async init() {
      try {
        const data = await api('/api/home');
        const header = [];
        const tc = data.timeContext || data;
        if (tc.dayOfWeek) header.push({ text: `${tc.dayOfWeek} ${tc.localTime || ''} ${tc.dayPeriod || ''}`, color: 8 });
        if (data.pendingNotificationCount > 0) header.push({ text: `${data.pendingNotificationCount} notifications pending`, color: 12 });
        if (data.activeAgentCount > 0) header.push({ text: `${data.activeAgentCount} agents running`, color: 10 });
        if (data.nextRoutine) {
          const nr = data.nextRoutine;
          const time = nr.time ? new Date(nr.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
          header.push({ text: `Next: [${nr.type}] ${nr.name} ${time}`, color: 10 });
        }
        header.push({ text: '\u2500'.repeat(30), color: 3 });
        this.lines = [
          ...header,
          ...menuItems.map(m => ({ text: m.text, color: 10, _menuItem: m })),
        ];
        this.cursor = header.length; // start on first menu item
        render();
      } catch (e) {
        this.lines = [
          { text: 'API unreachable', color: 4 },
          { text: '\u2500'.repeat(30), color: 3 },
          ...menuItems.map(m => ({ text: m.text, color: 10, _menuItem: m })),
        ];
        this.cursor = 2;
        render();
      }
    },
    onPress(idx) {
      const item = this.lines[idx];
      if (item?._menuItem) {
        const s = item._menuItem.screen();
        if (s) pushScreen(s);
      }
    },
    onLongPress() { pushScreen(makeAgentChatScreen()); },
  };
}

// ═══════════════════════════════════════════════════════════════════════
//  AGENT CHAT
// ═══════════════════════════════════════════════════════════════════════

function makeAgentChatScreen() {
  return {
    title: 'Agent Chat',
    lines: [],
    cursor: -1,
    scroll: 0,
    isChat: true,
    init() {
      chatBlocks = [];
      chatScroll = 0;
      chatAutoScroll = true;
      if (chatAbort) { chatAbort.abort(); chatAbort = null; }
      chatBlocks.push({ type: 'status', text: 'Press or speak to ask something' });
      render();
    },
    onLongPress() {
      if (chatAbort) { chatAbort.abort(); chatAbort = null; }
      popScreen();
    },
  };
}

/** Word-wrap text to fit within maxW pixels (char-count based) */
function wordWrap(text, maxW) {
  const maxChars = Math.floor(maxW / font.charWidth);
  const results = [];
  for (const rawLine of text.split('\n')) {
    if (!rawLine) { results.push(''); continue; }
    const words = rawLine.split(' ');
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (test.length > maxChars && current) {
        results.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) results.push(current);
  }
  return results;
}

// ── State icons ──
const IC_RUN = '\u25D0';  // ◐
const IC_OK  = '\u2713';  // ✓
const IC_ERR = '\u2717';  // ✗

function stateIcon(state) {
  return state === 'running' ? IC_RUN : state === 'failed' ? IC_ERR : IC_OK;
}

/** Render a tool line: icon name (elapsed) */
function toolLine(tool, indent) {
  const icon = stateIcon(tool.state);
  const time = tool.elapsed ? ' (' + tool.elapsed + ')' : '';
  return indent + icon + ' ' + tool.name + time;
}

/** Helper: wrap text with a given indent prefix, pushing to lines array */
function pushWrapped(lines, text, indent, maxW) {
  const indentW = indent.length * font.charWidth;
  for (const l of wordWrap(text, maxW - indentW)) lines.push(indent + l);
}

/** Convert chat blocks to flat display lines */
function flattenChatBlocks() {
  const pad = 4;
  const maxW = W - pad * 2;
  const lines = [];
  for (const block of chatBlocks) {
    switch (block.type) {
      case 'user':
        pushWrapped(lines, '> ' + block.text, '', maxW);
        lines.push('');
        break;
      case 'thinking': {
        const preview = block.text.length > 60 ? block.text.slice(0, 60) + '...' : block.text;
        pushWrapped(lines, preview, '  ', maxW);
        break;
      }
      case 'tool':
        lines.push(toolLine(block, '  '));
        if (block.summary) pushWrapped(lines, block.summary, '    ', maxW);
        break;
      case 'task': {
        const icon = stateIcon(block.state);
        const time = block.elapsed ? ' (' + block.elapsed + ')' : '';
        pushWrapped(lines, icon + ' ' + (block.description || block.taskId) + time, '  ', maxW);
        for (const child of block.children) {
          lines.push(toolLine(child, '    '));
          if (child.summary) pushWrapped(lines, child.summary, '      ', maxW);
        }
        break;
      }
      case 'text':
        pushWrapped(lines, block.text, '  ', maxW);
        break;
      case 'result':
        lines.push('  ' + block.turns + ' turns  ' + block.duration + '  ' + block.cost);
        break;
      case 'status':
        pushWrapped(lines, block.text, '  ', maxW);
        break;
    }
  }
  return lines;
}

/** Find a task block by ID */
function findTaskBlock(taskId) {
  if (!taskId) return null;
  for (let i = chatBlocks.length - 1; i >= 0; i--) {
    if (chatBlocks[i].type === 'task' && chatBlocks[i].taskId === taskId) return chatBlocks[i];
  }
  return null;
}

/** Find a running tool block — inside a task if taskId given, else top-level */
function findRunningTool(name, taskId) {
  if (taskId) {
    const task = findTaskBlock(taskId);
    if (task) {
      for (let i = task.children.length - 1; i >= 0; i--) {
        if (task.children[i].name === name && task.children[i].state === 'running') return task.children[i];
      }
    }
  }
  // Search top-level
  for (let i = chatBlocks.length - 1; i >= 0; i--) {
    if (chatBlocks[i].type === 'tool' && chatBlocks[i].name === name && chatBlocks[i].state === 'running') {
      return chatBlocks[i];
    }
  }
  return null;
}

/** Find the most recent tool block (any state) in tasks or top-level */
function findRecentTool() {
  for (let i = chatBlocks.length - 1; i >= 0; i--) {
    if (chatBlocks[i].type === 'tool') return chatBlocks[i];
    if (chatBlocks[i].type === 'task') {
      const ch = chatBlocks[i].children;
      if (ch.length > 0) return ch[ch.length - 1];
    }
  }
  return null;
}

/** Handle a single SSE event from the agent stream */
function handleStreamEvent(event) {
  switch (event.type) {
    case 'thinking': {
      // Replace previous thinking block instead of accumulating
      const last = chatBlocks[chatBlocks.length - 1];
      if (last?.type === 'thinking') { last.text = event.text; }
      else chatBlocks.push({ type: 'thinking', text: event.text });
      break;
    }
    case 'tool_start': {
      const toolBlock = { type: 'tool', name: event.name, state: 'running', elapsed: null, summary: null };
      if (event.taskId) {
        const task = findTaskBlock(event.taskId);
        if (task) { task.children.push(toolBlock); break; }
      }
      chatBlocks.push(toolBlock);
      break;
    }
    case 'tool_progress': {
      const tool = findRunningTool(event.name, event.taskId);
      if (tool) {
        tool.elapsed = event.elapsed ? event.elapsed.toFixed(1) + 's' : tool.elapsed;
        if (event.message) tool.summary = event.message;
      }
      break;
    }
    case 'tool_end': {
      const tool = findRunningTool(event.name, null);
      if (tool) {
        tool.state = event.isError ? 'failed' : 'done';
        if (event.summary) tool.summary = event.summary;
        if (event.error) tool.summary = event.error;
      }
      break;
    }
    case 'tool_summary': {
      const tool = findRecentTool();
      if (tool) tool.summary = event.summary;
      break;
    }
    case 'task_started':
      chatBlocks.push({ type: 'task', taskId: event.taskId, description: event.description || event.taskId, state: 'running', elapsed: null, children: [] });
      break;
    case 'task_progress': {
      const task = findTaskBlock(event.taskId);
      if (task && event.durationMs) {
        task.elapsed = (event.durationMs / 1000).toFixed(1) + 's';
      }
      break;
    }
    case 'task_completed': {
      const task = findTaskBlock(event.taskId);
      if (task) {
        task.state = (event.status === 'error' || event.status === 'failed') ? 'failed' : 'done';
        if (event.summary && !task.elapsed) task.elapsed = event.summary;
      }
      break;
    }
    case 'text':
      chatBlocks.push({ type: 'text', text: event.text });
      break;
    case 'agent_init':
      // Suppress verbose init
      break;
    case 'compaction':
      chatBlocks.push({ type: 'status', text: 'Compacting...' });
      break;
    case 'result':
      chatBlocks.push({ type: 'result', turns: event.turns, duration: (event.durationMs / 1000).toFixed(1) + 's', cost: '$' + event.costUsd.toFixed(4) });
      break;
    case 'error':
      chatBlocks.push({ type: 'status', text: IC_ERR + ' ' + event.message });
      break;
    case 'status':
    case 'progress':
      chatBlocks.push({ type: 'status', text: event.message });
      break;
  }
  render();
}

/** Send a message to the agent via the streaming endpoint */
async function sendChatMessage(text) {
  // Add user message block
  chatBlocks.push({ type: 'user', text });
  chatAutoScroll = true;
  chatStreamActive = true;
  render();

  // Abort any previous stream
  if (chatAbort) { chatAbort.abort(); chatAbort = null; }
  chatAbort = new AbortController();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      signal: chatAbort.signal,
    });

    if (!res.ok) {
      handleStreamEvent({ type: 'error', message: 'HTTP ' + res.status });
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Parse SSE events from buffer
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // keep incomplete chunk
      for (const part of parts) {
        if (!part.trim()) continue;
        let eventType = 'message';
        let data = '';
        for (const line of part.split('\n')) {
          if (line.startsWith('event: ')) eventType = line.slice(7);
          else if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (data) {
          try {
            handleStreamEvent(JSON.parse(data));
          } catch {}
        }
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      handleStreamEvent({ type: 'error', message: e.message });
    }
  } finally {
    chatAbort = null;
    chatStreamActive = false;
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  OPENAPI DISCOVERY (status only)
// ═══════════════════════════════════════════════════════════════════════
async function loadSpec() {
  try {
    const spec = await api('/api/openapi.json');
    const count = Object.values(spec.paths || {}).reduce((n, m) =>
      n + Object.keys(m).filter(k => k !== 'parameters').length, 0);
    document.getElementById('status').textContent = `${count} functions`;
  } catch (e) {
    document.getElementById('status').textContent = 'spec: ' + e.message;
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  SSE
// ═══════════════════════════════════════════════════════════════════════
function connectSSE() {
  try {
    const es = new EventSource('/api/events');
    // Dashboard refresh events
    for (const evt of ['agent_started','agent_completed','routine_reminder','alarm_triggered']) {
      es.addEventListener(evt, () => {
        const s = currentScreen();
        if (s?.init) s.init();
      });
    }
    // Cross-surface agent stream events (from Discord or other surfaces)
    const agentEvents = ['thinking','tool_start','tool_progress','tool_end',
      'tool_summary','task_started','task_progress','task_completed',
      'text','agent_init','compaction','result','error','status','progress'];
    for (const evt of agentEvents) {
      es.addEventListener(evt, (e) => {
        if (chatStreamActive) return; // already receiving from own stream
        if (!currentScreen()?.isChat) return;
        try { handleStreamEvent(JSON.parse(e.data)); } catch {}
      });
    }
    // Cross-surface user input (show messages from other surfaces)
    es.addEventListener('user_input', (e) => {
      if (!currentScreen()?.isChat) return;
      try {
        const data = JSON.parse(e.data);
        if (data.source === 'g2') return; // don't echo own input
        chatBlocks.push({ type: 'user', text: '[' + data.source + '] ' + data.text });
        chatAutoScroll = true;
        render();
      } catch {}
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════════
//  LINE HEIGHT
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('lineHeight').onchange = function() {
  LH = parseInt(this.value);
  buildFont(LH);
  document.getElementById('dims').textContent = `${W}x${H} @${font.tileH}`;
  render();
};

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════
(async () => {
  buildFont(LH);
  await loadSpec();
  pushScreen(makeHomeScreen());
  connectSSE();
})();
